<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bağlantı yok — Neith</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #faf7f2;
        color: #2a2320;
        font-family: Georgia, "Times New Roman", serif;
        text-align: center;
        padding: 24px;
      }
      .card {
        max-width: 360px;
      }
      h1 {
        color: #7a2e2e;
        font-size: 28px;
        margin-bottom: 8px;
      }
      p {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 14px;
        line-height: 1.6;
        color: #5a5049;
      }
      button {
        margin-top: 20px;
        border: 1px solid #7a2e2e;
        background: transparent;
        color: #7a2e2e;
        padding: 10px 20px;
        font-size: 13px;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        cursor: pointer;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      button:hover {
        background: #7a2e2e;
        color: #faf7f2;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Bağlantı yok</h1>
      <p>İnternet bağlantın şu anda yok gibi görünüyor. Bağlantın geri geldiğinde sayfayı yenileyebilirsin.</p>
      <button onclick="location.reload()">Tekrar Dene</button>
    </div>
  </body>
</html>
